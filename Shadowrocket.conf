# ══════════════════════════════════════════════════════════════════════════════
#  [Host] — 本地 DNS 映射
# ══════════════════════════════════════════════════════════════════════════════

[Host]
# 系统 DNS 处理苹果服务（避免 CDN 失准）
*.apple.com = server:system
*.icloud.com = server:system
localhost = 127.0.0.1

# ══════════════════════════════════════════════════════════════════════════════
#  [URL Rewrite] — URL 重写
# ══════════════════════════════════════════════════════════════════════════════

[URL Rewrite]
# Google 搜索防跳转
^https?://(www\.)?g\.cn https://www.google.com 302
^https?://(www\.)?google\.cn https://www.google.com 302

# ══════════════════════════════════════════════════════════════════════════════
#  [MITM] — 中间人解密
# ══════════════════════════════════════════════════════════════════════════════

[MITM]
# 默认不开启 MITM（量化交易场景不需要；如需脚本化，可在此添加 hostname）
hostname = *.google.cn
enable = false

